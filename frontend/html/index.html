<!DOCTYPE html>
<html>
    <head>
        <title>Groupies</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <header>
            <h1>Groupies</h1>
            <button class = "button1" type="button">Find your next trips</button>
            <div id="loginregDiv">  
                <button class="button1" type="button">Login</button>
                <button class="button1" type="button">Register</button>
            </div>
        </header>

        <main>
            <section class="section-box" id="Discover-Journeys">
                <h2>Discover Journeys</h2>
                <ul>
                    <li>
                        <article class="Trip">
                            <div class="TripInformation">
                                <img class="tripImage" src="img/notFound.jpg">
                                <div class="tripText">
                                    <p class="tripTittle">Iceland Roundtrip</p>
                                    <p class="tripHost">Hosted by someone</p>
                                </div>
                            </div>
                            <i class="fa-regular fa-star"></i>
                        </article>
                    </li>
                    <li>
                        <article class="Trip">
                            <div class="TripInformation">
                                <img class="tripImage" src="img/notFound.jpg">
                                <div class="tripText">
                                    <p class="tripTittle">Iceland Roundtrip</p>
                                    <p class="tripHost">Hosted by someone</p>
                                </div>
                            </div>
                            <i class="fa-regular fa-star"></i>
                        </article>
                    </li>
                </ul>
               
            </section>
            <aside class="aside-box">
                <h2>Popular users</h2>
                <ul>
                    <l1>
                        <article class="User-box">
                            <div class="main-user-info">
                                <div class="User-info">
                                    <img class="userImage" src="img/notFound.jpg">
                                    <div class="userText">
                                        <p class="userName">Jens</p>
                                        <p class="userInfoText">19, Male, Denmark</p>
                                    </div>
                                </div>
                            </div>
                            <div class="user-pref-front">
                                <ul class="pref-list-front">
                                    <l1 class="pref-item">
                                        Adventure
                                    </l1>
                                    <l1 class="pref-item">
                                        Culture
                                    </l1>
                                </ul>
                            </div>
                             
                        </article>
                    </l1>
                </ul>
            </aside>
        </main>
        <footer>

        </footer>
    </body>
</html>
