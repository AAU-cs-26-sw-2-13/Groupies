<!DOCTYPE html>
<html>
    <head>
        <title>Groupies</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <header>
            <h1>Groupies</h1>
            <button class = "button" type="button">Find your next trips</button>
            <div id="loginregDiv">  
                <button class="button" type="button">Login</button>
                <button class="button button1" type="button" id="register">Register</button>
            </div>
        </header>

        <main>
            <section class="section-box" id="Discover-Journeys">
                <h2>Discover Journeys</h2>
                <article class="Trip">
                    <div class="TripInformation">
                        <img class="tripImage" src="img/notFound.jpg">
                        <div class="tripText">
                            <p class="tripTittle">Iceland Roundtrip</p>
                            <p class="tripHost">Hosted by someone</p>
                        </div>
                    </div>
                    <i class="fa-regular fa-star"></i>
                </article>
            </section>
            <aside class="aside-box">
                <h2>Popular users</h2>
            </aside>
        </main>
        <footer>

        </footer>
    <script src="../src/button.js"></script>
    </body>
</html>
