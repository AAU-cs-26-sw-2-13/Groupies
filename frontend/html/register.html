<!DOCTYPE html>
<html>
    <head>
        <title>Groupies</title>
        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>
        <header>
            <h1>Groupies</h1>
            <button class = "button" type="button">Find your next trips</button>
            <div id="loginregDiv">  
                <button class="button" type="button">Login</button>
                <button class="button button1" type="button" id="register">Register</button>
            </div>
        </header>

        <main>
            <section class="register-box-top">
                <h3>Registration</h3>
            <section class="register-box" id="reg-box">
                <ul>
                    <li>
                        <form id="stepOne">
                            <label for="firstName"></label>
                            <input type="text" id="firstName" placeholder="First Name" class="reg-box-inputs">
                            <input type="text" id="lastName" placeholder="Last Name" class="reg-box-inputs">
                            <input type="password" id="password" placeholder="Password" class="reg-box-inputs">
                            <input type="text" id="email" placeholder="Email" class="reg-box-inputs">
                            <div class="center-align">
                                <button class="trans-box-button trans-box-button1" type="submit" id="return">Back</button>
                                <button class="box-button box-button1" type="submit" id="pageturn" name="submit button">Next</button>
                            </div>
                            <div class="center-align">
                                Step 1/3
                            </div>
                        </form>
                    </li>
                </ul>
            </section>
            </section>


        </main>

    </body>

    <script src="../src/button.js"></script>
    <script src="../src/register.js"></script>

    </html>
